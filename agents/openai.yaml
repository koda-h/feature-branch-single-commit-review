interface:
  display_name: "Feature Branch Single Commit Review"
  short_description: "Review one commit from a feature branch"
  default_prompt: "Use $feature-branch-single-commit-review to review up to 10 single-commit diffs on this feature branch, put the latest-commit status at the start of each finding, show a GitHub-style before/after diff snippet for each finding, note whether each finding is fixed in the latest commit, and save the report under docs/code_review/."
